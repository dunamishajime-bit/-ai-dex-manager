server {
    listen 80;
    listen [::]:80;
    server_name professional-dismanager.net;
    return 301 https://professional-dismanager.net$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.professional-dismanager.net;
    return 301 https://professional-dismanager.net$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.professional-dismanager.net;
    ssl_certificate /etc/letsencrypt/live/professional-dismanager.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/professional-dismanager.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://professional-dismanager.net$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name professional-dismanager.net;
    client_max_body_size 20m;
    ssl_certificate /etc/letsencrypt/live/professional-dismanager.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/professional-dismanager.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
